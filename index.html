<div class="container">

        <div class="signin-signup">
            <form action="" class="sign-in-form">
                <h2 class="title">Sign in</h2>
                <div class="input-field">
                    <i class="fa-solid fa-user" style="color: #6a003f;"></i>
                    <input type="text" placeholder="Username">
                </div>
                <div class="input-field">
                    <i class="fa-solid fa-lock" style="color: #6a003f;"></i>
                    <input type="password" placeholder="Password">
                </div>
                <input type="submit" value="Login" class="btn-solid">

                <p class="social-text">Or Sign in with social platforms</p>
                <div class="social-media">
                    <a href="#" class="social-icon">
                        <i class="fa-brands fa-facebook" style="color: #ffffff;"></i>
                    </a>
                    <a href="#" class="social-icon">
                        <i class="fa-brands fa-twitter" style="color: #ffffff;"></i>
                    </a>
                    <a href="#" class="social-icon">

                    </a>
                    <a href="#" class="social-icon">
                        <i class="fa-brands fa-linkedin" style="color: #ffffff;"></i>
                    </a>
                </div>
            </form>

                    <!-- SIGN UP-->
            <form action="" class="sign-up-form">
                <h2 class="title">Sign up</h2>
                <div class="input-field">
                    <i class="fa-solid fa-user" style="color: #6a003f;"></i>
                    <input type="text" placeholder="Username">
                </div> 

                <div class="input-field">
                    <i class="fa-solid fa-envelope" style="color: #6a003f;"></i>
                    <input type="text" placeholder="Email">
                </div>

                <div class="input-field">
                    <i class="fa-solid fa-lock" style="color: #6a003f;"></i>
                    <input type="password" placeholder="Password">
                </div>
                <input type="submit" value="Sign up" class="btn-solid">
                <p class="social-text">Or Sign up with social platforms</p>
                <div class="social-media">
                    <a href="#" class="social-icon">
                        <i class="fa-brands fa-facebook" style="color: #6a003f;"></i>
                    </a>
                    <a href="#" class="social-icon">
                        <i class="fa-brands fa-twitter" style="color: #6a003f;"></i>
                    </a>
                    <a href="#" class="social-icon">
                        <i class="fa-brands fa-google" style="color: #6a003f;"></i>
                    </a>
                    <a href="#" class="social-icon">
                        <i class="fa-brands fa-linkedin" style="color: #6a003f;"></i>
                    </a>
                </div>
            </form>

        </div>

    </div>
